[project]
name = "hscodesearch-mcp"
version = "0.1.0"
description = "MCP server for HS code search project"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "mcp>=1.6.0",
  "httpx>=0.28.1",
  "python-dotenv>=1.0.1"
]

[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[tool.uv]
package = false
